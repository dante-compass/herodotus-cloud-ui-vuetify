packages:
  - packages/**
  - shared/**

allowBuilds:
  "@parcel/watcher": false
  "@tsparticles/engine": false
  core-js: false
  esbuild: false

minimumReleaseAgeExclude:
  - "vite"
  - "vue"
  - "vuetify"
  - '@vue/compiler-core'
  - '@vue/compiler-dom'
  - '@vue/compiler-sfc'
  - '@vue/compiler-ssr'
  - '@vue/reactivity'
  - '@vue/runtime-core'
  - '@vue/runtime-dom'
  - '@vue/server-renderer'
  - '@vue/shared'
