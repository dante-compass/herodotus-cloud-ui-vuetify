worker_processes  1;

error_log  /var/log/nginx/error.log warn;

pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main    '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;

    keepalive_timeout  65;

    gzip  on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $uri $is_specific_path {
        default 0;
        "/static/js/environment.js" 1;  # 环境变量配置文件
    }

    upstream herodotus.cn {
        server 192.168.101.10:8847;
    }

    # 设置真实IP模块（如果需要）
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 0.0.0.0/0;  # 允许所有 IP 地址的代理

    server {
        listen       8000;
        server_name  localhost;

        location / {
            root   /etc/nginx/html/ui;
            index  index.html index.htm;
            # 解决刷新页面变成404问题的代码
            try_files $uri $uri/ @router;

            if ($request_filename ~* \.(html)$) {
                add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate"; # 起作用
            }

            if ($request_filename ~* \.(css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2|ttf|eot)$) {
                add_header Cache-Control max-age=604800; # 起作用
            }

            # 前端配置文件environment.js，强制不缓存（此条根据js文件名称去判断的，需要放在通用js配置之后，不然会被覆盖）
            if ($is_specific_path) {
                add_header Cache-Control "private, no-store, no-cache, must-revalidate, proxy-revalidate"; # 起作用
            }

            # 开启gzip
            gzip on;

            # 启用gzip压缩的最小文件，小于设置值的文件将不会压缩
            gzip_min_length 1k;

            #gzip 压缩级别，1-9，数字越大压缩的越好，也越占用CPU时间
            gzip_comp_level 6;

            # 进行压缩的文件类型。javascript有多种形式。其中的值可以在 mime.types 文件中找到
            gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript image/jpeg image/gif image/png image/avif image/webp image/apng image/svg+xml image/x-icon application/vnd.ms-fontobject font/ttf font/opentype font/x-woff font/woff2 font/eot;

            # 是否在http header中添加Vary: Accept-Encoding，建议开启
            gzip_vary on;

            # 禁用IE 6 gzip
            gzip_disable "MSIE [1-6]\.";

            # 设置压缩所需要的缓冲区大小
            gzip_buffers 32 16k;

            # 设置gzip压缩针对的HTTP协议版本
            gzip_http_version 1.1;

            gzip_static on;

            gzip_proxied expired no-cache no-store private auth;
        }

        location @router {
            rewrite ^.*$ /index.html last;
        }

        location /api/ {
            proxy_pass  http://herodotus.cn/;

            # 核心IP转发头部、  
            proxy_set_header  X-Real-IP  $remote_addr;
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto  $scheme;
            proxy_set_header  X-Forwarded-Host  $host;
            proxy_set_header  X-Forwarded-Port  $server_port;

            # 其他重要头部
            proxy_set_header  Host  $host;

            #如果使用"default"参数，将根据location和proxy_pass参数的设置来决定。
            #proxy_redirect [ default|off|redirect replacement ];
            #proxy_redirect off;
        }

        location /socket/ {
            proxy_pass  http://herodotus.cn/;
            # 设置 X-Real-IP 为直连客户端的IP
            proxy_set_header  X-Real-IP  $remote_addr;
            # 将完整的代理链IP列表附加到 X-Forwarded-For
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            # 可选：同时转发Host等信息
            proxy_set_header  Host  $host;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header  Upgrade  $http_upgrade;
            proxy_set_header  Connection  $connection_upgrade;
        }

        location /reactive/ {
            proxy_pass  http://herodotus.cn/;
            # 设置 X-Real-IP 为直连客户端的IP
            proxy_set_header  X-Real-IP  $remote_addr;
            # 将完整的代理链IP列表附加到 X-Forwarded-For
            proxy_set_header  X-Forwarded-For  $proxy_add_x_forwarded_for;
            # 可选：同时转发Host等信息
            proxy_set_header  Host  $host;
            proxy_set_header  X-Forwarded-Proto $scheme;
            proxy_http_version  1.1;
            proxy_set_header  Upgrade  $http_upgrade;
            proxy_set_header  Connection  $connection_upgrade;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
